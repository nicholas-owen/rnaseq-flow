# =============================================================================
# MultiQC configuration for the rnaseq-flow pipeline
# -----------------------------------------------------------------------------
# Staged into the MULTIQC work directory and picked up automatically by
# `multiqc .`. It sets the report identity, orders the modules in pipeline
# order, tidies sample names, and loads multiqc_custom.css for a restyled,
# rnaseq-flow-branded report interface.
# =============================================================================

# ---- Report identity --------------------------------------------------------
title: "rnaseq-flow"
subtitle: "Bulk RNA-seq quality-control report"
intro_text: >-
  Aggregated quality control for an rnaseq-flow run — read QC, adapter and
  quality trimming, alignment / quantification, library strandedness and gene
  counting, summarised across every sample. Read this report first: confirm
  there are no outlier samples and that mapping and strandedness look sane
  before interpreting the differential-expression results.
report_comment: >-
  Generated by the <a href="https://github.com/rnaseq-flow" target="_blank"
  rel="noopener">rnaseq-flow</a> Nextflow pipeline.

custom_logo: "multiqc_logo.png"
custom_logo_title: "rnaseq-flow"
custom_logo_url: "https://github.com/rnaseq-flow"

report_header_info:
  - Pipeline: "rnaseq-flow"
  - Data type: "Bulk RNA-seq"
  - Report: "Aggregated QC (MultiQC)"

# ---- Visual theme -----------------------------------------------------------
# A light restyle of the report in the rnaseq-flow blue palette.
custom_css_files:
  - "multiqc_custom.css"

# Drop the long, machine-specific analysis paths for a cleaner header.
show_analysis_paths: false
show_analysis_time: true
plots_force_interactive: true

# ---- Sample-name cleaning ---------------------------------------------------
# Extends (does not replace) MultiQC's defaults, so tool-specific suffixes
# collapse to one sample name across every module.
extra_fn_clean_exts:
  - ".fastp"
  - ".featureCounts"
  - "Aligned.sortedByCoord.out"
  - "Aligned.out"

# ---- Module order (logical pipeline order, top to bottom) -------------------
# Only the aligner that actually ran will contribute a section.
module_order:
  - fastqc:
      name: "FastQC — raw reads"
      info: "Sequence quality of the raw input reads, before trimming."
  - fastp:
      name: "fastp — adapter & quality trimming"
  - star
  - hisat2
  - salmon
  - kallisto
  - rseqc
  - featureCounts

# Keep the software-versions table at the very bottom.
report_section_order:
  software_versions:
    order: -1000
